services:
  payrune:
    build:
      context: ../..
      dockerfile: build/app/Dockerfile
    ports:
      - "8080:8080"
    restart: unless-stopped
  swagger:
    image: swaggerapi/swagger-ui:latest
    ports:
      - "8081:8080"
    environment:
      SWAGGER_JSON_URL: /openapi.yaml
      TRY_IT_OUT_ENABLED: "true"
    volumes:
      - ../swagger/openapi.yaml:/usr/share/nginx/html/openapi.yaml:ro
    depends_on:
      - payrune
    restart: unless-stopped
