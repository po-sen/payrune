name: payrune

services:
  postgres:
    image: postgres:18
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: payrune
      POSTGRES_USER: payrune
      POSTGRES_PASSWORD: payrune
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U payrune -d payrune"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s
    restart: unless-stopped
  migrate:
    build:
      context: ../..
      dockerfile: build/migrate/Dockerfile
    command: ["up"]
    environment:
      DATABASE_URL: postgres://payrune:payrune@postgres:5432/payrune?sslmode=disable
      MIGRATIONS_SOURCE: file:///api/migrations
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
  api:
    build:
      context: ../..
      dockerfile: build/api/Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://payrune:payrune@postgres:5432/payrune?sslmode=disable}
      BITCOIN_MAINNET_LEGACY_XPUB: ${BITCOIN_MAINNET_LEGACY_XPUB:-}
      BITCOIN_MAINNET_SEGWIT_XPUB: ${BITCOIN_MAINNET_SEGWIT_XPUB:-}
      BITCOIN_MAINNET_NATIVE_SEGWIT_XPUB: ${BITCOIN_MAINNET_NATIVE_SEGWIT_XPUB:-}
      BITCOIN_MAINNET_TAPROOT_XPUB: ${BITCOIN_MAINNET_TAPROOT_XPUB:-}
      BITCOIN_MAINNET_REQUIRED_CONFIRMATIONS: ${BITCOIN_MAINNET_REQUIRED_CONFIRMATIONS:-2}
      BITCOIN_MAINNET_RECEIPT_EXPIRES_AFTER: ${BITCOIN_MAINNET_RECEIPT_EXPIRES_AFTER:-24h}
    ports:
      - "8080:8080"
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped
  poller-mainnet:
    build:
      context: ../..
      dockerfile: build/poller/Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://payrune:payrune@postgres:5432/payrune?sslmode=disable}
      POLL_CHAIN: bitcoin
      POLL_NETWORK: mainnet
      POLL_TICK_INTERVAL: ${POLL_TICK_INTERVAL:-5s}
      POLL_RESCHEDULE_INTERVAL: ${POLL_RESCHEDULE_INTERVAL:-10m}
      POLL_BATCH_SIZE: ${POLL_BATCH_SIZE:-2}
      POLL_CLAIM_TTL: ${POLL_CLAIM_TTL:-30s}
      BITCOIN_MAINNET_ESPLORA_URL: ${BITCOIN_MAINNET_ESPLORA_URL:-https://mempool.space/api}
      BITCOIN_MAINNET_ESPLORA_USER: ${BITCOIN_MAINNET_ESPLORA_USER:-}
      BITCOIN_MAINNET_ESPLORA_PASSWORD: ${BITCOIN_MAINNET_ESPLORA_PASSWORD:-}
      BITCOIN_MAINNET_ESPLORA_TIMEOUT: ${BITCOIN_MAINNET_ESPLORA_TIMEOUT:-10s}
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped
  receipt-webhook-dispatcher:
    build:
      context: ../..
      dockerfile: build/webhook-dispatcher/Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://payrune:payrune@postgres:5432/payrune?sslmode=disable}
      RECEIPT_WEBHOOK_DISPATCH_INTERVAL: ${RECEIPT_WEBHOOK_DISPATCH_INTERVAL:-15s}
      RECEIPT_WEBHOOK_DISPATCH_BATCH_SIZE: ${RECEIPT_WEBHOOK_DISPATCH_BATCH_SIZE:-50}
      RECEIPT_WEBHOOK_DISPATCH_CLAIM_TTL: ${RECEIPT_WEBHOOK_DISPATCH_CLAIM_TTL:-30s}
      RECEIPT_WEBHOOK_DISPATCH_MAX_ATTEMPTS: ${RECEIPT_WEBHOOK_DISPATCH_MAX_ATTEMPTS:-10}
      RECEIPT_WEBHOOK_DISPATCH_RETRY_DELAY: ${RECEIPT_WEBHOOK_DISPATCH_RETRY_DELAY:-1m}
      PAYMENT_RECEIPT_WEBHOOK_URL: ${PAYMENT_RECEIPT_WEBHOOK_URL:?PAYMENT_RECEIPT_WEBHOOK_URL is required}
      PAYMENT_RECEIPT_WEBHOOK_SECRET: ${PAYMENT_RECEIPT_WEBHOOK_SECRET:?PAYMENT_RECEIPT_WEBHOOK_SECRET is required}
      PAYMENT_RECEIPT_WEBHOOK_TIMEOUT: ${PAYMENT_RECEIPT_WEBHOOK_TIMEOUT:-10s}
      PAYMENT_RECEIPT_WEBHOOK_INSECURE_SKIP_VERIFY: ${PAYMENT_RECEIPT_WEBHOOK_INSECURE_SKIP_VERIFY:-false}
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  postgres_data:
