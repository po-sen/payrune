services:
  app:
    environment:
      BITCOIN_TESTNET4_LEGACY_XPUB: ${BITCOIN_TESTNET4_LEGACY_XPUB:-}
      BITCOIN_TESTNET4_SEGWIT_XPUB: ${BITCOIN_TESTNET4_SEGWIT_XPUB:-}
      BITCOIN_TESTNET4_NATIVE_SEGWIT_XPUB: ${BITCOIN_TESTNET4_NATIVE_SEGWIT_XPUB:-}
      BITCOIN_TESTNET4_TAPROOT_XPUB: ${BITCOIN_TESTNET4_TAPROOT_XPUB:-}
      BITCOIN_TESTNET4_REQUIRED_CONFIRMATIONS: ${BITCOIN_TESTNET4_REQUIRED_CONFIRMATIONS:-1}

  poller-testnet4:
    build:
      context: ../..
      dockerfile: build/poller/Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://payrune:payrune@postgres:5432/payrune?sslmode=disable}
      POLL_INTERVAL: ${POLL_INTERVAL:-15s}
      POLL_BATCH_SIZE: ${POLL_BATCH_SIZE:-50}
      POLL_CLAIM_TTL: ${POLL_CLAIM_TTL:-30s}
      POLL_CHAIN: bitcoin
      POLL_NETWORK: testnet4
      BITCOIN_TESTNET4_ESPLORA_URL: ${BITCOIN_TESTNET4_ESPLORA_URL:-https://mempool.space/testnet4/api}
      BITCOIN_TESTNET4_ESPLORA_USER: ${BITCOIN_TESTNET4_ESPLORA_USER:-}
      BITCOIN_TESTNET4_ESPLORA_PASSWORD: ${BITCOIN_TESTNET4_ESPLORA_PASSWORD:-}
      BITCOIN_TESTNET4_ESPLORA_TIMEOUT: ${BITCOIN_TESTNET4_ESPLORA_TIMEOUT:-10s}
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped
