openapi: 3.0.3
info:
  title: Payrune Local API
  version: "1.0.0"
  description: OpenAPI spec for local testing through Swagger UI.
servers:
  - url: http://localhost:8080
paths:
  /health:
    get:
      summary: Service health check
      operationId: getHealth
      tags:
        - Health
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
              examples:
                default:
                  value:
                    status: up
                    timestamp: "2026-03-03T03:53:25Z"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                default:
                  value:
                    error: internal server error
        "405":
          description: Method not allowed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                default:
                  value:
                    error: method not allowed
  /v1/chains/{chain}/address-policies:
    get:
      summary: List address policies for a chain
      operationId: listAddressPolicies
      tags:
        - Addresses
      parameters:
        - name: chain
          in: path
          required: true
          schema:
            type: string
            enum:
              - bitcoin
              - ethereum
      responses:
        "200":
          description: Address policies listed successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAddressPoliciesResponse"
              examples:
                default:
                  value:
                    chain: bitcoin
                    addressPolicies:
                      - addressPolicyId: bitcoin-testnet4-legacy
                        chain: bitcoin
                        network: testnet4
                        scheme: legacy
                        decimals: 8
                        enabled: true
                      - addressPolicyId: bitcoin-testnet4-segwit
                        chain: bitcoin
                        network: testnet4
                        scheme: segwit
                        decimals: 8
                        enabled: true
                      - addressPolicyId: bitcoin-testnet4-native-segwit
                        chain: bitcoin
                        network: testnet4
                        scheme: nativeSegwit
                        decimals: 8
                        enabled: true
                      - addressPolicyId: bitcoin-testnet4-taproot
                        chain: bitcoin
                        network: testnet4
                        scheme: taproot
                        decimals: 8
                        enabled: false
                ethereum:
                  value:
                    chain: ethereum
                    addressPolicies:
                      - addressPolicyId: ethereum-sepolia-create2
                        chain: ethereum
                        network: sepolia
                        scheme: create2
                        decimals: 18
                        enabled: true
                      - addressPolicyId: ethereum-sepolia-usdt-create2
                        chain: ethereum
                        network: sepolia
                        scheme: create2
                        assetReference: 0xd077a400968890eacc75cdc901f0356c943e4fdb
                        decimals: 6
                        enabled: true
        "404":
          description: Chain not supported.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                default:
                  value:
                    error: chain is not supported
        "405":
          description: Method not allowed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                default:
                  value:
                    error: method not allowed
        "500":
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                default:
                  value:
                    error: internal server error
  /v1/chains/{chain}/payment-addresses:
    post:
      summary: Allocate unique payment address from address policy
      operationId: allocatePaymentAddress
      tags:
        - Addresses
      parameters:
        - name: chain
          in: path
          required: true
          schema:
            type: string
            enum:
              - bitcoin
              - ethereum
        - name: Idempotency-Key
          in: header
          required: false
          schema:
            type: string
          description: Optional request replay key. Reusing the same key with the same request returns the same allocation.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - addressPolicyId
                - expectedAmountMinor
              properties:
                addressPolicyId:
                  type: string
                  example: bitcoin-testnet4-native-segwit
                expectedAmountMinor:
                  type: integer
                  format: int64
                  minimum: 1
                  example: 2000
                customerReference:
                  type: string
                  nullable: true
                  default: null
                  example: null
            examples:
              bitcoin:
                value:
                  addressPolicyId: bitcoin-testnet4-native-segwit
                  expectedAmountMinor: 2000
                  customerReference: null
              ethereum:
                value:
                  addressPolicyId: ethereum-sepolia-create2
                  expectedAmountMinor: 100000000000000
                  customerReference: null
              ethereumUSDT:
                value:
                  addressPolicyId: ethereum-sepolia-usdt-create2
                  expectedAmountMinor: 1000000
                  customerReference: null
      responses:
        "201":
          description: Payment address allocated successfully.
          headers:
            Idempotency-Replayed:
              description: Present with value `true` when this success response is replayed from an existing idempotency record.
              schema:
                type: string
                enum:
                  - "true"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AllocatePaymentAddressResponse"
              examples:
                default:
                  value:
                    paymentAddressId: "101"
                    addressPolicyId: bitcoin-testnet4-native-segwit
                    expectedAmountMinor: 2000
                    chain: bitcoin
                    network: testnet4
                    scheme: nativeSegwit
                    decimals: 8
                    address: "tb1qexamplepaymentaddress"
                ethereum:
                  value:
                    paymentAddressId: "501"
                    addressPolicyId: ethereum-sepolia-create2
                    expectedAmountMinor: 100000000000000
                    customerReference: null
                    chain: ethereum
                    network: sepolia
                    scheme: create2
                    decimals: 18
                    address: "0x1234567890abcdef1234567890abcdef12345678"
                ethereumUSDT:
                  value:
                    paymentAddressId: "502"
                    addressPolicyId: ethereum-sepolia-usdt-create2
                    expectedAmountMinor: 1000000
                    customerReference: null
                    chain: ethereum
                    network: sepolia
                    scheme: create2
                    assetReference: 0xd077a400968890eacc75cdc901f0356c943e4fdb
                    decimals: 6
                    address: "0xabcdefabcdefabcdefabcdefabcdefabcdefabcd"
        "400":
          description: Invalid request.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                invalidAddressPolicyId:
                  value:
                    error: addressPolicyId is invalid
                invalidBody:
                  value:
                    error: invalid request body
                invalidExpectedAmount:
                  value:
                    error: expected amount is invalid
        "404":
          description: Chain not supported or address policy not supported.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                unsupportedChain:
                  value:
                    error: chain is not supported
                unsupportedPolicy:
                  value:
                    error: address policy is not supported
        "405":
          description: Method not allowed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                default:
                  value:
                    error: method not allowed
        "409":
          description: Allocation conflict.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                disabled:
                  value:
                    error: address policy is not enabled
                poolExhausted:
                  value:
                    error: address pool is exhausted
                idempotencyKeyConflict:
                  value:
                    error: idempotency key conflicts with existing payment address
        "500":
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                default:
                  value:
                    error: internal server error
  /v1/chains/{chain}/payment-addresses/{paymentAddressId}:
    get:
      summary: Get current payment status for one payment address
      operationId: getPaymentAddressStatus
      tags:
        - Addresses
      parameters:
        - name: chain
          in: path
          required: true
          schema:
            type: string
            enum:
              - bitcoin
              - ethereum
        - name: paymentAddressId
          in: path
          required: true
          schema:
            type: integer
            format: int64
            minimum: 1
          example: 101
      responses:
        "200":
          description: Current payment status returned successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetPaymentAddressStatusResponse"
              examples:
                partiallyPaid:
                  value:
                    paymentAddressId: "101"
                    addressPolicyId: bitcoin-testnet4-native-segwit
                    expectedAmountMinor: 2000
                    chain: bitcoin
                    network: testnet4
                    scheme: nativeSegwit
                    decimals: 8
                    address: tb1qexamplepaymentaddress
                    paymentStatus: partially_paid
                    observedTotalMinor: 1500
                    confirmedTotalMinor: 1000
                    unconfirmedTotalMinor: 500
                    requiredConfirmations: 1
                    lastObservedBlockHeight: 123
                    issuedAt: "2026-03-08T11:00:00Z"
                    firstObservedAt: "2026-03-08T11:05:00Z"
                    expiresAt: "2026-03-15T11:00:00Z"
                ethereumWatching:
                  value:
                    paymentAddressId: "501"
                    addressPolicyId: ethereum-sepolia-usdt-create2
                    expectedAmountMinor: 2500000
                    customerReference: order-20260405-usdt-001
                    chain: ethereum
                    network: sepolia
                    scheme: create2
                    assetReference: 0xd077a400968890eacc75cdc901f0356c943e4fdb
                    decimals: 6
                    address: "0x1234567890abcdef1234567890abcdef12345678"
                    paymentStatus: watching
                    observedTotalMinor: 0
                    confirmedTotalMinor: 0
                    unconfirmedTotalMinor: 0
                    requiredConfirmations: 12
                    lastObservedBlockHeight: 7250000
                    issuedAt: "2026-03-20T09:00:00Z"
                    expiresAt: "2026-03-21T09:00:00Z"
        "400":
          description: Invalid payment address id.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                default:
                  value:
                    error: invalid paymentAddressId
        "404":
          description: Chain or payment address not found.
          content:
            application/json:
              schema:
                type: object
                required:
                  - error
                properties:
                  error:
                    type: string
                    example: payment address is not found
              examples:
                paymentAddressNotFound:
                  value:
                    error: payment address is not found
                chainNotSupported:
                  value:
                    error: chain is not supported
        "405":
          description: Method not allowed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                default:
                  value:
                    error: method not allowed
        "500":
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                default:
                  value:
                    error: internal server error
components:
  schemas:
    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string
          example: internal server error
    HealthResponse:
      type: object
      required:
        - status
        - timestamp
      properties:
        status:
          type: string
          example: up
        timestamp:
          type: string
          format: date-time
          example: "2026-03-03T03:53:25Z"
    AddressPolicy:
      type: object
      required:
        - addressPolicyId
        - chain
        - network
        - scheme
        - decimals
        - enabled
      properties:
        addressPolicyId:
          type: string
          example: bitcoin-testnet4-native-segwit
        chain:
          type: string
          enum:
            - bitcoin
            - ethereum
          example: bitcoin
        network:
          type: string
          example: testnet4
        scheme:
          type: string
          enum:
            - legacy
            - segwit
            - nativeSegwit
            - taproot
            - create2
          example: nativeSegwit
        assetReference:
          type: string
          example: 0xd077a400968890eacc75cdc901f0356c943e4fdb
        decimals:
          type: integer
          minimum: 0
          maximum: 18
          example: 8
        enabled:
          type: boolean
          example: true
    ListAddressPoliciesResponse:
      type: object
      required:
        - chain
        - addressPolicies
      properties:
        chain:
          type: string
          enum:
            - bitcoin
            - ethereum
          example: bitcoin
        addressPolicies:
          type: array
          items:
            $ref: "#/components/schemas/AddressPolicy"
    AllocatePaymentAddressResponse:
      type: object
      required:
        - paymentAddressId
        - addressPolicyId
        - expectedAmountMinor
        - chain
        - network
        - scheme
        - decimals
        - address
      properties:
        paymentAddressId:
          type: string
          example: "101"
        addressPolicyId:
          type: string
          example: bitcoin-testnet4-native-segwit
        expectedAmountMinor:
          type: integer
          format: int64
          minimum: 1
          example: 2000
        customerReference:
          type: string
          example: optional external reference
        chain:
          type: string
          enum:
            - bitcoin
            - ethereum
          example: bitcoin
        network:
          type: string
          example: testnet4
        scheme:
          type: string
          enum:
            - legacy
            - segwit
            - nativeSegwit
            - taproot
            - create2
          example: nativeSegwit
        assetReference:
          type: string
          example: 0xd077a400968890eacc75cdc901f0356c943e4fdb
        decimals:
          type: integer
          minimum: 0
          maximum: 18
          example: 8
        address:
          type: string
          example: tb1qexamplepaymentaddress
    GetPaymentAddressStatusResponse:
      type: object
      required:
        - paymentAddressId
        - addressPolicyId
        - expectedAmountMinor
        - chain
        - network
        - scheme
        - decimals
        - address
        - paymentStatus
        - observedTotalMinor
        - confirmedTotalMinor
        - unconfirmedTotalMinor
        - requiredConfirmations
        - lastObservedBlockHeight
        - issuedAt
      properties:
        paymentAddressId:
          type: string
          example: "101"
        addressPolicyId:
          type: string
          example: bitcoin-testnet4-native-segwit
        expectedAmountMinor:
          type: integer
          format: int64
          minimum: 1
          example: 2000
        customerReference:
          type: string
          example: optional external reference
        chain:
          type: string
          enum:
            - bitcoin
            - ethereum
          example: bitcoin
        network:
          type: string
          example: testnet4
        scheme:
          type: string
          enum:
            - legacy
            - segwit
            - nativeSegwit
            - taproot
            - create2
          example: nativeSegwit
        assetReference:
          type: string
          example: 0xd077a400968890eacc75cdc901f0356c943e4fdb
        decimals:
          type: integer
          minimum: 0
          maximum: 18
          example: 8
        address:
          type: string
          example: bc1qexamplepaymentaddress
        paymentStatus:
          type: string
          enum:
            - watching
            - partially_paid
            - paid_unconfirmed
            - paid_unconfirmed_reverted
            - paid_confirmed
            - failed_expired
          example: partially_paid
        observedTotalMinor:
          type: integer
          format: int64
          minimum: 0
          example: 80000
        confirmedTotalMinor:
          type: integer
          format: int64
          minimum: 0
          example: 40000
        unconfirmedTotalMinor:
          type: integer
          format: int64
          minimum: 0
          example: 40000
        requiredConfirmations:
          type: integer
          minimum: 1
          example: 1
        lastObservedBlockHeight:
          type: integer
          format: int64
          minimum: 0
          example: 123
        issuedAt:
          type: string
          format: date-time
          example: "2026-03-08T11:00:00Z"
        firstObservedAt:
          type: string
          format: date-time
          example: "2026-03-08T11:05:00Z"
        paidAt:
          type: string
          format: date-time
          example: "2026-03-08T11:09:00Z"
        confirmedAt:
          type: string
          format: date-time
          example: "2026-03-08T11:20:00Z"
        expiresAt:
          type: string
          format: date-time
          example: "2026-03-15T11:00:00Z"
        lastError:
          type: string
          example: bitcoin observer timeout
