repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
        args: ["--maxkb=1024"]
      - id: detect-private-key
      - id: check-symlinks
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        files: "\\.(md|markdown)$"
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.33.0
    hooks:
      - id: markdownlint
        args: ["--config", ".markdownlint.json"]
        files: "\\.(md|markdown)$"
  - repo: https://github.com/APIDevTools/swagger-cli
    rev: v4.0.4
    hooks:
      - id: swagger-validation
        pass_filenames: false
        always_run: true
        args: ["validate", "deployments/swagger/openapi.yaml"]
  - repo: local
    hooks:
      - id: goimports
        name: goimports
        entry: goimports
        args: ["-w"]
        language: golang
        additional_dependencies:
          - golang.org/x/tools/cmd/goimports@v0.38.0
        types: [go]
  - repo: https://github.com/golangci/golangci-lint
    rev: v1.64.8
    hooks:
      - id: golangci-lint
        args: ["--fix", "--timeout=5m", "./..."]
        pass_filenames: false
        types: [go]
  - repo: local
    hooks:
      - id: go-test-short
        name: go test (short)
        entry: bash -c 'go test ./... -short -count=1'
        language: system
        pass_filenames: false
        types: [go]
      - id: spec-lint
        name: spec lint
        entry: bash
        args:
          - -c
          - |
            set -euo pipefail
            spec_dirs="$(printf "%s\n" "$@" | awk -F/ '$1=="specs" && NF>=2 {print $1"/"$2}' | sort -u)"
            if [ -z "$spec_dirs" ]; then
              exit 0
            fi
            while IFS= read -r dir; do
              [ -n "$dir" ] || continue
              SPEC_DIR="$dir" bash scripts/spec-lint.sh
            done <<< "$spec_dirs"
          - --
        language: system
        files: '^specs/[^/]+/.+\.md$'
  - repo: local
    hooks:
      - id: go-mod-tidy
        name: go mod tidy (and verify clean diff)
        entry: bash -c 'go mod tidy && git diff --exit-code -- go.mod go.sum'
        language: system
        pass_filenames: false
        files: '^go\.(mod|sum)$'
  - repo: local
    hooks:
      - id: govulncheck
        name: govulncheck
        entry: govulncheck ./...
        language: golang
        additional_dependencies:
          - golang.org/x/vuln/cmd/govulncheck@v1.1.4
        pass_filenames: false
        stages: [manual]
